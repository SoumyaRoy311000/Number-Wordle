<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Wordle</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>Number Wordle</h1>
            <button id="theme-toggle">Toggle Dark Mode</button>
        </header>

        <div class="info">
            <p>Guess a 5-digit number in 6 attempts!</p>
            <div class="feedback-legend">
                <span class="legend-item green">Green: Correct digit & position</span>
                <span class="legend-item yellow">Yellow: Within 2 (nearby)</span>
                <span class="legend-item orange">Orange: Within 4 (close)</span>
                <span class="legend-item red">Red: More than 4 away</span>
            </div>
        </div>

        <div id="game-status" class="game-status"></div>

        <div class="game-container">
            <div id="grid" class="grid"></div>
        </div>

        <div class="keyboard">
            <div id="keyboard" class="keyboard-grid"></div>
            <div class="keyboard-controls">
                <button id="backspace-btn" class="control-btn">← Backspace</button>
                <button id="submit-btn" class="control-btn submit-btn">Submit</button>
            </div>
        </div>

        <div class="footer">
            <a href="{{ url_for('analyze') }}" id="analyze-btn" style="display: none;">Analyze Game</a>
            <a href="{{ url_for('new_game') }}" id="new-game-btn" style="display: none;">New Game</a>
        </div>
    </div>

    <script>
        const ROWS = 6;
        const COLS = 5;
        let currentRow = 0;
        let currentCol = 0;
        let gameActive = true;
        let gameWon = false;
        let tiles = [];

        // Initialize grid
        function initializeGrid() {
            const gridContainer = document.getElementById('grid');
            gridContainer.innerHTML = '';
            tiles = [];

            for (let r = 0; r < ROWS; r++) {
                const row = [];
                for (let c = 0; c < COLS; c++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.dataset.row = r;
                    tile.dataset.col = c;
                    gridContainer.appendChild(tile);
                    row.push(tile);
                }
                tiles.push(row);
            }
        }

        // Initialize keyboard
        function initializeKeyboard() {
            const keyboardContainer = document.getElementById('keyboard');
            keyboardContainer.innerHTML = '';

            for (let i = 0; i <= 9; i++) {
                const btn = document.createElement('button');
                btn.className = 'key-btn';
                btn.textContent = i;
                btn.addEventListener('click', () => handleKeyPress(i.toString()));
                keyboardContainer.appendChild(btn);
            }
        }

        // Handle key press (from keyboard or on-screen buttons)
        function handleKeyPress(key) {
            if (!gameActive) return;

            if (key === 'Backspace' && currentCol > 0) {
                currentCol--;
                tiles[currentRow][currentCol].textContent = '';
            } else if (key === 'Enter') {
                submitGuess();
            } else if (/^\d$/.test(key) && currentCol < COLS) {
                tiles[currentRow][currentCol].textContent = key;
                currentCol++;
            }
        }

        // Submit current guess
        async function submitGuess() {
            if (currentCol < COLS) {
                alert('Please enter all 5 digits!');
                return;
            }

            const guess = Array.from(tiles[currentRow])
                .map(tile => tile.textContent)
                .join('');

            try {
                const response = await fetch('{{ url_for("api_guess") }}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ guess: guess })
                });

                const data = await response.json();

                if (data.success) {
                    colorTiles(currentRow, data.feedback);
                    currentRow++;
                    currentCol = 0;

                    if (data.won) {
                        gameActive = false;
                        gameWon = true;
                        document.getElementById('game-status').innerHTML = 
                            `<div class="win-message">🎉 You won in ${7 - data.remaining_tries} attempts!</div>`;
                        document.getElementById('analyze-btn').style.display = 'inline-block';
                        document.getElementById('new-game-btn').style.display = 'inline-block';
                    } else if (data.remaining_tries <= 0) {
                        gameActive = false;
                        document.getElementById('game-status').innerHTML = 
                            `<div class="lose-message">Game Over! Better luck next time.</div>`;
                        document.getElementById('new-game-btn').style.display = 'inline-block';
                    } else {
                        document.getElementById('game-status').textContent = 
                            `Attempts remaining: ${data.remaining_tries}`;
                    }
                } else {
                    alert(data.message || 'Invalid guess');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred. Please try again.');
            }
        }

        // Color tiles based on feedback
        function colorTiles(row, feedback) {
            for (let col = 0; col < COLS; col++) {
                const tile = tiles[row][col];
                tile.classList.add(`colored`);
                tile.classList.add(feedback[col]);
            }
        }

        // Event listeners for physical keyboard
        document.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            if (/^\d$/.test(e.key)) {
                handleKeyPress(e.key);
            } else if (e.key === 'Backspace') {
                e.preventDefault();
                handleKeyPress('Backspace');
            } else if (e.key === 'Enter') {
                e.preventDefault();
                submitGuess();
            }
        });

        // Backspace button
        document.getElementById('backspace-btn').addEventListener('click', () => {
            handleKeyPress('Backspace');
        });

        // Submit button
        document.getElementById('submit-btn').addEventListener('click', submitGuess);

        // Theme toggle
        const toggleButton = document.getElementById('theme-toggle');
        const body = document.body;

        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'dark') {
            body.classList.add('dark');
            toggleButton.textContent = 'Toggle Light Mode';
        }

        toggleButton.addEventListener('click', () => {
            body.classList.toggle('dark');
            const isDark = body.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            toggleButton.textContent = isDark ? 'Toggle Light Mode' : 'Toggle Dark Mode';
        });

        // Initialize on page load
        window.addEventListener('load', () => {
            initializeGrid();
            initializeKeyboard();
            document.getElementById('game-status').textContent = `Attempts remaining: 6`;
        });
    </script>
</body>
</html>
